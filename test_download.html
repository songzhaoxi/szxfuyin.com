    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
            padding: 0 30px;
            font-family: Kanit, 'Pingfang SC', Arial, 'Microsoft Yahei', sans-serif;
        }

        a {
            color: #cf121b;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-thumb {
            border-radius: 10px;
            background-color: #0000001a;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #00000033;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        .logo {
            position: fixed;
            top: 30px;
            left: 30px;
            border-radius: 100px;
        }

        main {
            max-width: 1200px;
            background-color: #fff;
            border-radius: 20px;
            padding: 60px;
            gap: 40px;
            box-shadow: 0 10px 20px #0000001a;
            display: flex;
            flex-direction: column;
            overflow: hidden;

            section.header {
                text-align: center;

                h1 {
                    padding-top: 10px;
                    font-size: 30px;
                }

                img {
                    border-radius: 200px;
                }

                i {
                    font-style: normal;
                    margin-right: 0.2em;
                }
            }

            section.rec {
                border-top: 1px solid #0000000d;
                padding-top: 30px;

                ul {
                    margin: 0;
                    padding: 10px 0 30px 0;
                    display: flex;
                    gap: 30px;
                    overflow-x: auto;

                    li {
                        font-size: 14px;
                        margin: 0;
                        text-align: center;
                        width: 150px;

                        a {
                            color: #333;
                            text-decoration: none;
                            display: flex;
                            flex-direction: column;
                            gap: 10px;
                        }

                        span {
                            display: block;
                            width: 100%;
                            white-space: nowrap;
                            text-overflow: ellipsis;
                            line-height: 20px;
                            overflow: hidden;
                        }

                        img {
                            border-radius: 10px;
                        }
                    }
                }

            }
        }

        @media screen and (max-width:720px) {
            main {
                padding: 30px;
            }

            main section.rec {
                ul {
                    gap: 15px;

                    li {
                        width: 80px;
                    }
                }
            }
        }

        .dark {
            background-color: #1f2329;

            ::-webkit-scrollbar-thumb {
                background-color: #ffffff1a;
            }

            main {
                background-color: #262b33;
                color: #ccc;

                .rec {
                    border-top-color: #ffffff0d;

                    a {
                        color: #ccc;
                    }
                }
            }
        }
    </style>

    <script type="67409ec00e617751bcf45a13-text/javascript">
        //Countdown
        var countdownEl = document.getElementById('countdown')
        var countdown = parseInt(countdownEl.innerHTML)
        setInterval(() => {
            if (countdown > 1) {
                countdown--
                countdownEl.innerHTML = countdown
            } else {
                location.href = '/'
            }
        }, 1000)

        //Recommendations
        var recEl = document.getElementById('rec')
        var recData = []
        fetch('/api/api/tv.movie/index?paginate=1&offset=0&limit=10&recommend=3').then(res => res.json()).then(res => {
            if (res.code == 1 && res.data) {
                let recHTML = ''
                for (var i = 0; i < res.data.data.length; i++) {
                    var item = res.data.data[i]
                    recHTML += `<li><a href="/content/view/movid/${item.movid}/index.html"><img src="${item.thumb}"/><span>${item.title}</span></a></li>`
                }
                recEl.innerHTML = recHTML
            }
        })

        //Dark Mode
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.className = 'dark'
        }
    </script>
